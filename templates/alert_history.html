<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert History - ExpiryGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <header>
            <div class="brand brand-dashboard">
                <div class="system-name">EXPIRYGUARD</div>
                <div class="welcome-title">ALERT HISTORY</div>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="goBackToDashboard()" title="Back to Dashboard">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button class="header-btn" onclick="exportAlertHistoryExcel()" title="Export to Excel">
                    <i class="fas fa-file-excel"></i>
                </button>
                <button class="header-btn" onclick="exportAlertHistoryPDF()" title="Export to PDF">
                    <i class="fas fa-file-pdf"></i>
                </button>
                <button class="header-btn" onclick="clearAlertHistory()" title="Clear History">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </header>

        <div class="main-grid" style="margin-top: 1rem;">
            <div class="content-section" style="width: 100%;">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-history" style="color: var(--primary);"></i>
                        Stored Alerts History
                    </h2>
                    <p style="color: var(--text-secondary); margin-top: 0.75rem; max-width: 800px;">
                        All alerts generated by ExpiryGuard are saved locally in your browser. Use the export buttons to download the history as Excel or PDF.
                    </p>
                </div>

                <div class="table-container" style="padding: 1rem 0;">
                    <table id="alertHistoryTable">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Type</th>
                                <th>Title</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody id="alertHistoryBody">
                            <tr>
                                <td colspan="4" class="notification-empty">Loading alert history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha512-tdh2jU4iQXGT7IhpJMAajFMn/ueU+uB3paC8aY+Woxp8RsbuvMN2EHRDlwph0V0C2NNr47gmSyxTzjfupCwGow==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-Z3R7fLhcX6Tj5dEvmSH1sBfGpALJgpvUc7XnVQwhcTiWeAxq3/iOPZJk1+0JyH9E9DxtlzKYGku0FhPKnWH6ZA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js" integrity="sha512-GmkpF9FxPIq1WXsnkCA2xnvC+IxT+Oe7kBiW61QVTUy7N5K2u3lseGWV0FQzArtLA1o/IVEHsG7w/qk9Nd0s5w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="{{ url_for('static', filename='js/alert_history.js') }}"></script>
</body>
</html>
