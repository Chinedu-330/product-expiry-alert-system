<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/edit_product.css') }}">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Edit Product · ExpiryGuard</title>

</head>
<body>
  <div class="shell">

    <!-- Top bar -->
    <div class="topbar">
      <button type="button" class="back-topbar" onclick="window.location.href='/dashboard'">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5" />
          <path d="M12 19l-7-7 7-7" />
        </svg>
        <span>Back to Dashboard</span>
      </button>
    </div>

    <!-- Breadcrumb -->
    <nav class="crumb">
      <a href="#">Dashboard</a>
      <span class="sep">/</span>
      <a href="#">Product Inventory</a>
      <span class="sep">/</span>
      <span class="here">Edit Product</span>
    </nav>

    <!-- Card -->
    <div class="card">
      <div class="card-head">
        <div class="row">
          <div class="head-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <div>
            <h1>Edit Product</h1>
            <p class="sub">Update product details, stock and expiry alerts.</p>
          </div>
        </div>
      </div>

      <form id="productForm" novalidate>
        <div class="grid">
          <div class="field full">
            <label for="name">Product Name</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4 8 4 8-4z"/><path d="M4 7v10l8 4 8-4V7"/></svg>
              <input
                  id="name"
                  name="name"
                  type="text"
                  value="{{ product.product_name }}"
>
            </div>
          </div>

          <div class="field">
            <label for="category">Category</label>
            <div class="input-wrap select-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <select id="category" name="category">
                <option value="{{ product.category }}" selected> {{ product.category }}</option>
                <option value="">Select category</option>
                <option>Food &amp; Beverages</option>
                <option>Dairy</option>
                <option>Bakery</option>
                <option>Produce</option>
                <option>Pharmacy</option>
                <option>Household</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="batch">Batch / Lot No</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7l8-4 8 4-8 4-8-4z"/><path d="M4 7v10l8 4 8-4V7"/><path d="M12 11v10"/></svg>
              <input id="batch" name="batch" type="text" placeholder="Optional" />
            </div>
          </div>

          <div class="field">
            <label for="quantity">Quantity</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/></svg>
              <input
                 id="quantity"
                 name="quantity"
                 type="number"
                 value="{{ product.quantity }}"
>
            </div>
          </div>

          <div class="field">
            <label for="expiry">Expiry Date</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              <input
                id="expiry" 
                name="expiry" 
                type="date" 
                value="{{ product.expiry_date }}"
>
            </div>
            <div class="status-row" id="statusRow">
              <span class="pill warn"><span class="dot"></span> Status updates on save</span>
            </div>
          </div>

          <div class="field full">
            <label for="threshold">Alert Threshold</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
              <input 
                  id="threshold" 
                  name="threshold" 
                  type="number" 
                  value="{{ product.alert_threshold }}">
            </div>
            <span class="hint">Get notified when stock falls below this number.</span>
          </div>
        </div>

        <div class="actions">
          <button type="button" class="btn-ghost" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
          <button type="reset" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
    Changes saved successfully
  </div>

<script src="{{ url_for('static',
filename='js/edit_product.js') }}"></script>

</body>
</html>
