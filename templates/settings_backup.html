<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup & Export - ExpiryGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <header>
            <div class="brand">SETTING</div>
        </header>

        <div class="section-header" style="margin: 2rem 0 1rem;">
            <h2 class="section-title"><i class="fas fa-file-export" style="color: var(--primary);"></i> Backup & Export</h2>
            <p style="color: var(--text-secondary); max-width: 680px; margin-top: 0.5rem;">
                Export your inventory and backup your data from this dedicated page.
            </p>
            <a href="/settings" class="btn-secondary" style="display:inline-flex; align-items:center; gap:0.5rem; margin-top:1rem; width: auto;">
                <i class="fas fa-arrow-left"></i>
                Back to Settings
            </a>
        </div>

        <div class="form-card">
            <h3 class="form-title"><i class="fas fa-file-pdf"></i> Export Products</h3>
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">
                Download product data in different formats for reporting and backups.
            </p>
            <button class="btn-secondary" onclick="exportproductsPDF()" style="margin-bottom: 1rem; width: 100%;">
                <i class="fas fa-file-pdf"></i>
                Export Products to PDF
            </button>
            <button class="btn-secondary" onclick="exportproductsExcel()" style="margin-bottom: 1rem; width: 100%;">
                <i class="fas fa-file-excel"></i>
                Export Products to Excel
            </button>
        </div>

        <div class="form-card">
            <h3 class="form-title"><i class="fas fa-database"></i> Backup Database</h3>
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">
                Preserve your current inventory state with a safe backup option.
            </p>
            <button class="btn-primary" onclick="backupDatabase()" style="width: 100%;">
                <i class="fas fa-save"></i>
                Backup Database
            </button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
